# ModelGate 配置文件示例
# 复制此文件：cp configs/config.example.yaml configs/config.yaml

server:
  # 服务监听地址
  host: "0.0.0.0"
  
  # 服务端口
  port: 8080
  
  # 最大请求体大小 (MB)
  max_body_mb: 5
  
  # 请求超时时间 (秒)
  timeout_seconds: 300
  
  # 模型同步间隔 (秒)
  sync_interval: 60

database:
  # SQLite 数据库文件路径
  path: "./data/modelgate.db"

redis:
  # Redis 服务器地址
  addr: "localhost:6379"
  
  # Redis 密码 (如无密码留空)
  password: ""
  
  # Redis 数据库编号
  db: 0

# 后端服务配置
backends:
  - type: "ollama"
    url: "http://localhost:11434"
    model_name: "default"
  
  - type: "vllm"
    url: "http://localhost:8000"
    model_name: "default"
  
  - type: "llama.cpp"
    url: "http://localhost:8080"
    model_name: "default"

# 日志配置 (可选)
log:
  level: "info"          # debug, info, warn, error
  format: "console"      # console, json

# 管理后台配置 (可选)
admin:
  enabled: true
  # 如果需要在不同端口运行管理后台，可取消注释
  # port: 8081
