server:
  host: 0.0.0.0
  port: 8080
  mode: release

database:
  path: ./data/modelgate.db

redis:
  addr: localhost:6379
  password: ""
  db: 0

rate_limit:
  rpm: 60
  burst: 10

quota:
  default_tokens: 1000000

timeout: 300s

max_body_size: 5242880

admin:
  api_key: ""  # Required on first startup (or set MG_ADMIN_API_KEY)

adapters:
  ollama:
    base_url: http://localhost:11434
  vllm:
    base_url: http://localhost:8000
  llamacpp:
    base_url: http://localhost:8080
  openai:
    base_url: https://api.openai.com/v1
  api3:
    base_url: https://api.ai.gov/v1

log:
  level: info
  format: json
