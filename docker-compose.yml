services:
  modelgate:
    build: .
    ports:
      - "${MODELGATE_PORT:-18080}:18080"
    volumes:
      - ./configs:/app/configs
    environment:
      - MG_REDIS_ADDR=redis:6379
      - MG_DATABASE_DSN=host=postgres user=modelgate password=modelgate dbname=modelgate port=5432 sslmode=disable TimeZone=UTC
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=modelgate
      - POSTGRES_USER=modelgate
      - POSTGRES_PASSWORD=modelgate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate -d modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:
