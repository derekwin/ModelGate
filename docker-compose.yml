services:
  modelgate:
    build: .
    network_mode: host
    volumes:
      - ./configs:/app/configs
    environment:
      - MG_REDIS_ADDR=127.0.0.1:16379
      - MG_DATABASE_DSN=host=127.0.0.1 user=modelgate password=modelgate dbname=modelgate port=15432 sslmode=disable TimeZone=UTC
      - MG_ADAPTERS_OLLAMA_BASE_URL=http://127.0.0.1:11434
      - MG_ADAPTERS_VLLM_BASE_URL=http://127.0.0.1:8000
      - MG_ADAPTERS_LLAMACPP_BASE_URL=http://127.0.0.1:8082
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_DB=modelgate
      - POSTGRES_USER=modelgate
      - POSTGRES_PASSWORD=modelgate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate -d modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:
