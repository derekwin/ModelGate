services:
  modelgate:
    build: .
    ports:
      - "${MODELGATE_DATA_PORT:-18080}:8080"
      - "${MODELGATE_ADMIN_PORT:-18081}:8081"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - MG_REDIS_ADDR=redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
